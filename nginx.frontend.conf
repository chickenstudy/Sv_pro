server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to FastAPI backend ────────────────────────────────────────────
    location /api/ {
        resolver 127.0.0.11 valid=60s;
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        resolver 127.0.0.11 valid=60s;
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend/health;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
    }

    location /metrics {
        resolver 127.0.0.11 valid=60s;
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend/metrics;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
    }

    # ── WebSocket proxy for go2rtc ────────────────────────────────────────────
    # go2rtc WebRTC signaling over WebSocket
    location /webrtc {
        resolver 127.0.0.11 valid=60s;
        set $upstream_go2rtc svpro-go2rtc:1984;
        proxy_pass http://$upstream_go2rtc;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── go2rtc HTTP API proxy ──────────────────────────────────────────────────
    # Frontend calls go2rtc API via /go2rtc-api prefix (Vite proxy dev, nginx proxy prod)
    location /go2rtc-api {
        resolver 127.0.0.11 valid=60s;
        set $upstream_go2rtc svpro-go2rtc:1984;
        rewrite ^/go2rtc-api(.*) $1 break;
        proxy_pass http://$upstream_go2rtc;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # go2rtc stream assets (m3u8, mp4, etc.) — direct passthrough
    location /stream.m3u8 {
        resolver 127.0.0.11 valid=60s;
        set $upstream_go2rtc svpro-go2rtc:1984;
        proxy_pass http://$upstream_go2rtc;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /stream.mp4 {
        resolver 127.0.0.11 valid=60s;
        set $upstream_go2rtc svpro-go2rtc:1984;
        proxy_pass http://$upstream_go2rtc;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Static files caching ────────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
