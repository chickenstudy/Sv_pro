[pytest]
# SV-PRO Test Configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Mark slow tests (integration / requires GPU)
markers =
    slow: marks tests as slow (not run by default in CI)
    gpu: marks tests that require NVIDIA GPU + Savant environment
    integration: marks integration tests that need a running service

# Show extra test summary info (failed, errors, skipped)
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Asyncio mode for any async tests
asyncio_mode = auto
