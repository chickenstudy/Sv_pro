services:
  # ── go2rtc: RTSP Broker trung tâm (thay thế ingress-manager + video-egress) ──
  svpro-go2rtc:
    image: alexxit/go2rtc:latest
    container_name: svpro_go2rtc
    restart: unless-stopped
    ports:
      - "1985:1984" # HTTP API + WebUI (1985 trên host tránh trùng VMS go2rtc)
      - "8556:8554" # RTSP re-stream (cho Savant AI Core)
      - "8557:8555/tcp" # WebRTC signaling (TCP)
      - "8557:8555/udp" # WebRTC media — DTLS/SRTP chạy trên UDP, bắt buộc phải map UDP
    volumes:
      - ./config/go2rtc.yaml:/config/go2rtc.yaml:rw
    networks:
      - svpro-net
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:1984/api/streams || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # NOTE: go2rtc-sync service đã bỏ — backend gọi go2rtc REST trực tiếp khi
  # CRUD camera (xem backend/go2rtc_client.py). rtsp_ingest vẫn poll DB/PG NOTIFY
  # để failsafe sync state nếu backend call fail.

  # ── savant-rtsp-ingress: RTSP Pull từ go2rtc → ZMQ Push vào Savant AI Core ──
  # Chức năng: Đọc frame RTSP từ go2rtc:8554/{source_id} cho từng camera active.
  #            Encode frame thành Savant RS VideoFrame protobuf → push vào ZMQ IPC.
  # Lắng nghe PG NOTIFY để tự động thêm/xóa camera stream khi DB thay đổi.
  #
  # QUAN TRỌNG: Phải dùng Dockerfile.savant-ai-core (KHÔNG dùng Dockerfile.backend)
  # vì savant_rs (serialize VideoFrame protobuf) chỉ có trong image savant-deepstream.
  # Cả hai service dùng cùng Dockerfile → Docker cache chia sẻ, không tốn disk gấp đôi.
  savant-rtsp-ingress:
    build:
      context: .
      dockerfile: Dockerfile.savant-ai-core
    restart: unless-stopped
    entrypoint: /opt/venv/bin/python   # venv của savant-deepstream chứa savant_rs
    command: ["-m", "src.ingress.rtsp_ingest"]
    depends_on:
      svpro-go2rtc:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      savant-ai-core:
        condition: service_started
    volumes:
      - .:/opt/savant/user_data
      - zmq-sockets:/tmp/zmq-sockets
    networks:
      - svpro-net
    environment:
      # /opt/savant = Savant framework libs (có savant_rs), /opt/savant/user_data = code của mình
      - PYTHONPATH=/opt/savant:/opt/savant/user_data
      - GO2RTC_URL=http://svpro-go2rtc:1984
      - GO2RTC_RTSP_BASE=rtsp://svpro-go2rtc:8554
      - ZMQ_PUB_ENDPOINT=pub+connect:ipc:///tmp/zmq-sockets/input-video.ipc
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      - POLL_INTERVAL_SECS=30
      # 8 fps/cam — sweet spot: phản hồi nhanh (125ms/frame) cho FR mà không
      # dồn quá nhiều load. Override per-deployment qua env hoặc DB cameras.fps_limit.
      - TARGET_FPS=15
    healthcheck:
      test: ["CMD-SHELL", "/opt/venv/bin/python -c \"import sys; sys.exit(0)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── AI Core: GPU Pipeline xử lý LPR + FR ──
  savant-ai-core:
    build:
      context: .
      dockerfile: Dockerfile.savant-ai-core
    runtime: nvidia
    # restart: unless-stopped là chính sách restart mặc định.
    # Docker Compose sẽ tự restart khi container exit bất kẻ lý do gì (OOM, crash, healthcheck fail).
    # Không cần watchdog tự gọi `docker compose restart` nữa.
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      svpro-go2rtc:
        condition: service_healthy
    ports:
      - "9080:8080" # 9080 trên host → tránh trùng với VMS API (8080)
      # 8090 không expose ra host — chỉ dành cho backend gọi nội bộ qua Docker network
    volumes:
      - .:/opt/savant/user_data
      - zmq-sockets:/tmp/zmq-sockets
      - ./models:/models
      - ./Detect:/Detect
    environment:
      - PYTHONPATH=/opt/savant:/opt/savant/user_data
      - MODEL_PATH=/models
      # ZMQ — AI Core nhận frames từ savant-rtsp-ingress qua ZMQ IPC:
      #   Input : SUB socket — nhận JPEG frames từ rtsp_ingest.py
      #   Output: PUB socket — phát metadata event cho subscriber (reserved)
      - ZMQ_SRC_ENDPOINT=sub+bind:ipc:///tmp/zmq-sockets/input-video.ipc
      - ZMQ_SINK_ENDPOINT=pub+bind:ipc:///tmp/zmq-sockets/output-video.ipc
      # ZMQ HWM — giới hạn buffer, tránh dead-lock khi pipeline stall
      - ZMQ_SNDHWM=100
      - ZMQ_RCVHWM=100
      # Database credentials — dùng env thay vì hardcode trong module.yml
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      # go2rtc RTSP base — savant-rtsp-ingress pull từ đây, truyền vào AI Core qua ZMQ
      - GO2RTC_RTSP_BASE=rtsp://svpro-go2rtc:8554
      # Port cho Enrollment HTTP Service (chạy trong thread riêng của AI Core)
      - ENROLLMENT_PORT=8090
    command: /opt/savant/user_data/module/module.yml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # pgrep -f 'module.yml': kiểm tra tiến trình Savant còn chạy.
      # start_period: 120s bời TensorRT cần ~60-120s để build engine lần đầu,
      # retries: 10 giới hạn số lần fail trước khi Docker đánh dấu unhealthy → restart.
      test: ["CMD-SHELL", "pgrep -f 'module.yml' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    # Phải cùng network với postgres và redis để resolve hostname.
    # Thiếu dòng này → "Temporary failure in name resolution" cho postgres/redis/backend.
    networks:
      - svpro-net

  # [REMOVED] json-egress: Không có consumer đọc file /output — AI Core gửi event trực tiếp
  # qua alert_manager → POST /api/events/ingest và audit_logger → psycopg2 → DB.
  #
  # [REMOVED] video-egress: Linux-only, được thay thế bằng go2rtc WebRTC/RTSP output.

  # ── PostgreSQL + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: svpro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svpro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svpro_pass}
      POSTGRES_DB: ${POSTGRES_DB:-svpro_db}
    ports:
      - "5433:5432" # 5433 trên host → tránh trùng với VMS postgres (5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/16/main/pg_hba.conf:ro
    networks:
      - svpro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svpro_user} -d ${POSTGRES_DB:-svpro_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migration (chạy 1 lần khi startup) ──
  db-init:
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svpro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svpro_pass}
      POSTGRES_DB: ${POSTGRES_DB:-svpro_db}
    volumes:
      - ./scripts/sql:/sql
    networks:
      - svpro-net
    # Fix: dùng $$VAR thay vì ${VAR} — Docker Compose escape 1 lớp $ trước khi truyền vào bash
    # Tạo database svpro_db nếu chưa tồn tại (postgres superuser mới có quyền CREATE DATABASE)
    # Sau đó chạy schema + migration + seed
    command: >
      bash -c "
        echo '▶ Bước 1: Tạo database nếu chưa có...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -tc \"SELECT 1 FROM pg_database WHERE datname='$$POSTGRES_DB'\" | grep -q 1 || \\
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -c \"CREATE DATABASE $$POSTGRES_DB\"
        echo '✅ Database sẵn sàng.'
        echo '▶ Bước 2: Grant quyền...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -c \"GRANT ALL ON SCHEMA public TO $$POSTGRES_USER\"
        echo '▶ Bước 3: Chạy schema...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/schema.sql
        echo '▶ Bước 4: Chạy migration 001...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/001_sprint4_5.sql
        echo '▶ Bước 4b: Chạy migration 002 (PG NOTIFY trigger)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/002_camera_notify_trigger.sql
        echo '▶ Bước 4c: Chạy migration 003 (Enrollment support)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/003_enrollment_support.sql
        echo '▶ Bước 4d: Chạy migration 004 (Snapshot images)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/004_snapshot_images.sql
        echo '▶ Bước 4e: Chạy migration 005 (App settings + retention runs)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/005_app_settings.sql
        echo '▶ Bước 4f: Chạy migration 006 (Camera ROI polygon)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/006_camera_roi.sql
        echo '▶ Bước 4g: Chạy migration 007 (Stranger multi-embedding gallery)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/007_stranger_gallery.sql
        echo '▶ Bước 5: Seed cameras...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/seed_cameras.sql
        echo '🎉 DB migrations + seed hoàn tất.'
      "
    restart: "no"

  # ── Frontend: Nginx serve SPA static files ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: svpro_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - svpro-net
    healthcheck:
      # nginx-alpine có busybox wget — dùng spider mode (chỉ HEAD, không tải nội dung).
      # Trỏ vào 127.0.0.1 vì localhost trong nginx có thể resolve ra IPv6 (::1) → fail.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── FastAPI Backend ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: svpro_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GO2RTC_URL: http://svpro-go2rtc:1984
      GO2RTC_RTSP_URL: rtsp://svpro-go2rtc:8554
      PUBLIC_GO2RTC_URL: http://192.168.42.171:1985
      # URL đến Enrollment HTTP Service bên trong savant-ai-core
      AI_CORE_ENROLL_URL: http://savant-ai-core:8090
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8081,http://localhost:80,http://localhost,http://192.168.42.171:8081,http://192.168.42.171}
    volumes:
      - snapshot_data:/data
      # Cùng /Detect với savant-ai-core (readonly) — backend serve ảnh detection
      # qua /api/detect-images/{rel_path}.
      - ./Detect:/Detect:ro
    networks:
      - svpro-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ── Redis (Hot Cache) ──
  redis:
    image: redis:7-alpine
    container_name: svpro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - svpro-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Stranger Dedup Cron ──
  # Chạy `scripts/dedup_strangers.py --apply` mỗi giờ để gộp các stranger_id
  # trùng visual về 1 ID đại diện. Lock file ngăn instance chồng nhau.
  # Threshold cosine 0.55 (cao hơn online 0.40) → conservative, không merge nhầm.
  stranger-dedup:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "while true; do
         python /app/scripts/dedup_strangers.py --apply || true;
         sleep 3600;
       done"
    environment:
      - POSTGRES_DSN=postgresql://svpro_user:svpro_pass@postgres:5432/svpro_db
      - DEDUP_SIM_THRESHOLD=0.55
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - svpro-net
    # Tắt healthcheck inherit từ backend image (image có healthcheck curl :8000)
    healthcheck:
      disable: true

  # NOTE: Monitoring stack (prometheus + grafana + exporters) đã bỏ để
  # giảm RAM ~600MB. Backend vẫn expose /metrics qua prometheus_fastapi_instrumentator
  # nếu sau này muốn bật lại — chỉ cần thêm services về.

volumes:
  zmq-sockets:
  pgdata:
  redis_data:
  snapshot_data:

networks:
  svpro-net:
    driver: bridge
