services:
  # ── go2rtc: RTSP Broker trung tâm (thay thế ingress-manager + video-egress) ──
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: svpro_go2rtc
    restart: unless-stopped
    ports:
      - "1984:1984" # HTTP API + WebUI
      - "8554:8554" # RTSP re-stream (cho Savant AI Core)
      - "8555:8555" # WebRTC
    volumes:
      - ./config/go2rtc.yaml:/config/go2rtc.yaml:ro
    networks:
      - svpro-net
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:1984/api/streams || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── go2rtc-sync: Sync cameras DB → go2rtc (đăng ký RTSP URL vào go2rtc REST API) ──
  # Chức năng: Lắng nghe PG NOTIFY cameras_changed → cập nhật go2rtc streams ngay lập tức.
  # go2rtc tự kết nối tới IP camera và expose RTSP re-stream tại :8554/{source_id}.
  go2rtc-sync:
    build:
      context: .
      dockerfile: Dockerfile.backend # Tái dùng Python base của backend, chỉ đổi command
    restart: unless-stopped
    entrypoint: python
    command: ["-m", "src.ingress.go2rtc_sync"]
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      go2rtc:
        condition: service_healthy
    volumes:
      - .:/opt/savant/user_data
    networks:
      - svpro-net
    environment:
      - PYTHONPATH=/opt/savant/user_data
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      - GO2RTC_URL=http://go2rtc:1984
      - POLL_INTERVAL_SECS=30
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f go2rtc_sync || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── savant-rtsp-ingress: RTSP Pull từ go2rtc → ZMQ Push vào Savant AI Core ──
  # Chức năng: Đọc frame RTSP từ go2rtc:8554/{source_id} cho từng camera active.
  #            Encode frame → push vào input-video.ipc cho savant-ai-core (ZMQ SUB).
  # Lắng nghe PG NOTIFY để tự động thêm/xóa camera stream khi DB thay đổi.
  savant-rtsp-ingress:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    entrypoint: python
    command: ["-m", "src.ingress.rtsp_ingest"]
    depends_on:
      go2rtc-sync:
        condition: service_healthy
      savant-ai-core:
        condition: service_started
    volumes:
      - .:/opt/savant/user_data
      - zmq-sockets:/tmp/zmq-sockets
    networks:
      - svpro-net
    environment:
      - PYTHONPATH=/opt/savant/user_data
      - GO2RTC_URL=http://go2rtc:1984
      - GO2RTC_RTSP_BASE=rtsp://go2rtc:8554
      - ZMQ_PUB_ENDPOINT=pub+connect:ipc:///tmp/zmq-sockets/input-video.ipc
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      - POLL_INTERVAL_SECS=30
      - TARGET_FPS=10
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f rtsp_ingest || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── AI Core: GPU Pipeline xử lý LPR + FR ──
  savant-ai-core:
    build:
      context: .
      dockerfile: Dockerfile.savant-ai-core
    runtime: nvidia
    # restart: unless-stopped là chính sách restart mặc định.
    # Docker Compose sẽ tự restart khi container exit bất kẻ lý do gì (OOM, crash, healthcheck fail).
    # Không cần watchdog tự gọi `docker compose restart` nữa.
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      go2rtc-sync:
        condition: service_healthy # Đảm bảo go2rtc đã có RTSP streams trước khi AI Core start
    ports:
      - "9080:8080" # 9080 trên host → tránh trùng với VMS API (8080)
      # 8090 không expose ra host — chỉ dành cho backend gọi nội bộ qua Docker network
    volumes:
      - .:/opt/savant/user_data
      - zmq-sockets:/tmp/zmq-sockets
      - ./models:/models
      - ./Detect:/Detect
    environment:
      - PYTHONPATH=/opt/savant:/opt/savant/user_data
      - MODEL_PATH=/models
      # ZMQ — AI Core nhận frames từ savant-rtsp-ingress qua ZMQ IPC:
      #   Input : SUB socket — nhận JPEG frames từ rtsp_ingest.py
      #   Output: PUB socket — phát metadata event cho subscriber (reserved)
      - ZMQ_SRC_ENDPOINT=sub+bind:ipc:///tmp/zmq-sockets/input-video.ipc
      - ZMQ_SINK_ENDPOINT=pub+bind:ipc:///tmp/zmq-sockets/output-video.ipc
      # ZMQ HWM — giới hạn buffer, tránh dead-lock khi pipeline stall
      - ZMQ_SNDHWM=100
      - ZMQ_RCVHWM=100
      # Database credentials — dùng env thay vì hardcode trong module.yml
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      # go2rtc RTSP base — savant-rtsp-ingress pull từ đây, truyền vào AI Core qua ZMQ
      - GO2RTC_RTSP_BASE=rtsp://go2rtc:8554
      # Port cho Enrollment HTTP Service (chạy trong thread riêng của AI Core)
      - ENROLLMENT_PORT=8090
    command: /opt/savant/user_data/module/module.yml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # pgrep -f 'module.yml': kiểm tra tiến trình Savant còn chạy.
      # start_period: 120s bời TensorRT cần ~60-120s để build engine lần đầu,
      # retries: 10 giới hạn số lần fail trước khi Docker đánh dấu unhealthy → restart.
      test: ["CMD-SHELL", "pgrep -f 'module.yml' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # [REMOVED] json-egress: Không có consumer đọc file /output — AI Core gửi event trực tiếp
  # qua alert_manager → POST /api/events/ingest và audit_logger → psycopg2 → DB.
  #
  # [REMOVED] video-egress: Linux-only, được thay thế bằng go2rtc WebRTC/RTSP output.

  # ── PostgreSQL + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: svpro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svpro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svpro_pass}
      POSTGRES_DB: ${POSTGRES_DB:-svpro_db}
    ports:
      - "5433:5432" # 5433 trên host → tránh trùng với VMS postgres (5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/16/main/pg_hba.conf:ro
    networks:
      - svpro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svpro_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migration (chạy 1 lần khi startup) ──
  db-init:
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svpro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svpro_pass}
      POSTGRES_DB: ${POSTGRES_DB:-svpro_db}
    volumes:
      - ./scripts/sql:/sql
    networks:
      - svpro-net
    # Fix: dùng $$VAR thay vì ${VAR} — Docker Compose escape 1 lớp $ trước khi truyền vào bash
    # Tạo database svpro_db nếu chưa tồn tại (postgres superuser mới có quyền CREATE DATABASE)
    # Sau đó chạy schema + migration + seed
    command: >
      bash -c "
        echo '▶ Bước 1: Tạo database nếu chưa có...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -tc \"SELECT 1 FROM pg_database WHERE datname='$$POSTGRES_DB'\" | grep -q 1 || \\
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -c \"CREATE DATABASE $$POSTGRES_DB\"
        echo '✅ Database sẵn sàng.'
        echo '▶ Bước 2: Grant quyền...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -c \"GRANT ALL ON SCHEMA public TO $$POSTGRES_USER\"
        echo '▶ Bước 3: Chạy schema...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/schema.sql
        echo '▶ Bước 4: Chạy migration 001...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/001_sprint4_5.sql
        echo '▶ Bước 4b: Chạy migration 002 (PG NOTIFY trigger)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/002_camera_notify_trigger.sql
        echo '▶ Bước 4c: Chạy migration 003 (Enrollment support)...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/migrations/003_enrollment_support.sql
        echo '▶ Bước 5: Seed cameras...'
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /sql/seed_cameras.sql
        echo '🎉 DB migrations + seed hoàn tất.'
      "
    restart: "no"

  # ── Frontend: Nginx serve SPA static files ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: svpro_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - svpro-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: svpro_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GO2RTC_URL: http://go2rtc:1984
      GO2RTC_RTSP_URL: rtsp://go2rtc:8554
      # URL đến Enrollment HTTP Service bên trong savant-ai-core
      AI_CORE_ENROLL_URL: http://savant-ai-core:8090
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8081,http://192.168.42.171:8081,http://192.168.42.171}
    networks:
      - svpro-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ── Redis (Hot Cache) ──
  redis:
    image: redis:7-alpine
    container_name: svpro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - svpro-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus — Metrics Collection ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: svpro_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - svpro-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana — Visualization ──
  grafana:
    image: grafana/grafana:10.4.0
    container_name: svpro_grafana
    restart: unless-stopped
    ports:
      - "3001:3000" # 3001 để tránh conflict với React dev server
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/svpro.json:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASS:-svpro2024}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis Exporter ──
  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: svpro_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - svpro-net

  # ── PostgreSQL Exporter ──
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: svpro_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}?sslmode=disable
    ports:
      - "9188:9187" # 9188 trên host → tránh trùng nếu có service khác dùng 9187
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - svpro-net

volumes:
  zmq-sockets:
  pgdata:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  svpro-net:
    driver: bridge
