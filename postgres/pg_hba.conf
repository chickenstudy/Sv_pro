# pg_hba.conf — override cho SV-PRO
# Cho phép tất cả kết nối nội bộ (Docker network) không cần password
# Chỉ áp dụng cho mạng Docker nội bộ

# TYPE  DATABASE        USER            ADDRESS                 METHOD
# trust: không hỏi password (chỉ dùng trong Docker nội bộ)
host    all            all             172.16.0.0/12           trust
host    all            all             192.168.0.0/16          trust
host    all            all             10.0.0.0/8              trust

# peer/authenticate cho local socket (an toàn)
local   all            postgres                                peer
# md5 cho các kết nối từ bên ngoài (host machine)
host    all            all             0.0.0.0/0              md5
host    all            all             ::/0                    md5
