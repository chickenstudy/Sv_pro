name: sv-pro-high-performance-pipeline

# ── Global Parameters ────────────────────────────────────────────────────────
parameters:
  frame:
    # 1920×1080 = shape CHUNG mà rtsp_ingest.py resize về trước khi push ZMQ.
    # Mọi camera khác resolution (1280×720, 2592×1944, 1080×1920) được
    # resize về shape này → nvstreammux capsfilter không reject → 4 cam đồng
    # thời xử lý qua pipeline. Trước đây 2592×1944 chỉ cam_online_1 match.
    width: 1920
    height: 1080
  output_frame:
    # WSL2 mode: raw-rgb24 (no NVENC)
    # Linux production: codec: h264, encoder: nvenc
    codec: raw-rgb24
  draw_func:
    module: src.debug_drawfunc
    class_name: DebugDrawFunc
  buffer_queues:
    length: 20        # Giới hạn buffer trong pipeline
    byte_size: 0

  # ── nvstreammux tuning ──────────────────────────────────────────────────────
  # Mục đích: nvstreammux gom frame từ N source thành batch trước khi đẩy vào
  # nvinfer. Tinh chỉnh theo số camera + TARGET_FPS để cân throughput/latency:
  #
  #   batch_size              = N (số camera active đồng thời).
  #   batched_push_timeout µs = 1e6 / TARGET_FPS / 2  (nửa frame period).
  #
  # Với 4 camera @ 15 FPS:
  #   batch_size = 4  → nvinfer xử lý 4 frame từ 4 source trong 1 CUDA call
  #   batched_push_timeout = 40_000 (40ms) — nếu không gom đủ 4 frame trong
  #     40ms (camera trễ, mất frame), vẫn flush để tránh stall pipeline.
  #
  # Default Savant (2_000_000 = 2s) quá dài → camera lag gây latency khủng.
  batch_size: 4
  batched_push_timeout: 40000

  # ── ZMQ Backpressure Config ──────────────────────────────────────────────────
  zmq:
    snd_hwm: 100        # Sender High-Water Mark
    rcv_hwm: 100        # Receiver High-Water Mark

  # ── Telemetry (Savant 0.6.1 compatible) ─────────────────────────────────────
  # Schema: TelemetryParameters { tracing: TracingParameters, metrics: MetricsParameters }
  # MetricsParameters: frame_period, time_period, history, extra_labels
  telemetry:
    tracing:
      sampling_period: 100
      append_frame_meta_to_span: false
    metrics:
      frame_period: 1000
      time_period: 10
      history: 100

# ── Pipeline Elements ─────────────────────────────────────────────────────────
pipeline:
  elements:
    # ── Stage 1: Primary Detector (YOLOv8s) ──────────────────────────────────
    # Phát hiện đồng thời Phương tiện và Con người trên GPU
    - element: nvinfer@complex_model
      name: yolov8_primary
      model:
        format: onnx
        model_file: /models/yolov8/yolov8s.onnx
        # batch_size 4 → 1 GPU inference call xử lý 4 frames cùng lúc, throughput
        # tăng ~3x so với batch=1 (do tiết kiệm overhead launch CUDA kernel).
        # Latency tăng nhẹ ~10ms/batch nhưng vẫn dưới 30ms tổng → realtime OK.
        batch_size: 4
        input:
          layer_name: images
          shape: [3, 640, 640]
          scale_factor: 0.0039215697906911373
        output:
          layer_names:
            - output0
          converter:
            module: src.converters.yolov8_converter
            class_name: YOLOv8Converter
            kwargs:
              confidence_threshold: 0.25
              nms_iou_threshold: 0.45
          attributes: []
          num_detected_classes: 80
          objects:
            - class_id: 0
              label: person
            - class_id: 2
              label: car
            - class_id: 3
              label: motorcycle
            - class_id: 5
              label: bus
            - class_id: 7
              label: truck

    # NOTE: debug_pyfunc đã TẮT — trước đó log ERROR "Saw N objects!" mỗi frame
    # tốn ~15% CPU format/flush log. Bật lại chỉ khi debug pipeline flow.
    # - element: pyfunc
    #   module: src.debug_pyfunc
    #   class_name: DebugPyFunc
    #   name: debug_post_yolo

    # ── Stage 1b: NvSORT Object Tracker ──────────────────────────────────────
    # Tracking vehicles/persons across frames trước khi đưa vào LPR/FR
    - element: nvtracker
      name: object_tracker
      properties:
        tracker-width: 640
        tracker-height: 480
        ll-lib-file: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
        ll-config-file: /opt/savant/user_data/tracker/config_tracker_NvSORT.yml
        display-tracking-id: true

    # ── Stage 1c: Fall Detector (fallen / falling / standing) ────────────────
    - element: nvinfer@complex_model
      name: fall_detector
      model:
        format: onnx
        model_file: /models/fall_detector/fall_detector.onnx
        batch_size: 4
        input:
          layer_name: images
          shape: [3, 640, 640]
          scale_factor: 0.0039215697906911373
        output:
          layer_names:
            - output0
          converter:
            module: src.converters.generic_yolov8_converter
            class_name: GenericYOLOv8Converter
            kwargs:
              confidence_threshold: 0.3
              nms_iou_threshold: 0.45
          num_detected_classes: 3
          objects:
            - class_id: 0
              label: fallen
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.4
            - class_id: 1
              label: falling
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.4
            - class_id: 2
              label: standing
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.5
          attributes: []

    # ── Stage 1d: Covered Person Detector (person / covered_person) ───────────
    - element: nvinfer@complex_model
      name: covered_person_detector
      model:
        format: onnx
        model_file: /models/covered_person/covered_person_detector.onnx
        batch_size: 4
        input:
          layer_name: images
          shape: [3, 640, 640]
          scale_factor: 0.0039215697906911373
        output:
          layer_names:
            - output0
          converter:
            module: src.converters.generic_yolov8_converter
            class_name: GenericYOLOv8Converter
            kwargs:
              confidence_threshold: 0.3
              nms_iou_threshold: 0.45
          num_detected_classes: 2
          objects:
            - class_id: 0
              label: person
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.5
            - class_id: 1
              label: covered_person
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.4
          attributes: []

    # ── Stage 2a-pre: Plate Detector sGIE ─────────────────────────────────────
    # Chạy YOLOv8n-plate thẳng trên GPU (TensorRT FP16), operate trên crop
    # của object "car" do primary YOLOv8s detect. Xuất object con label "plate"
    # để PlateOCR pyfunc phía sau chỉ cần đọc bbox và chạy OCR, không phải
    # chạy ORT CUDAExecutionProvider 1 lần nữa.
    #
    # NOTE: plate detector hiện chỉ chạy trên "car". Để phủ motorcycle/bus/truck
    # cần copy paste thêm stanza với input.object khác, hoặc dùng class ID list
    # qua extra properties. Giữ đơn giản trước — đa số plate là xe hơi.
    - element: nvinfer@complex_model
      name: plate_detector_sgie
      model:
        format: onnx
        # ⚠ YOLOv8l_plate = 175 MB. TRT compile lần đầu ~15-25 phút (cache sau
        # vào models/engine/). Batch_size giảm 16 → 8 vì model lớn — activations
        # chiếm ~4-5 GB VRAM nếu batch 16 → RTX 3060 có thể OOM.
        model_file: /models/yolov8l_plate/yolov8l_plate.onnx
        # ONNX export với input fixed 1280×1280 (verified onnxruntime). Nếu set
        # shape=640 → TRT báo "Dimension mismatch ... profile has min=640, opt=640,
        # max=640 but tensor has 1280". Batch giảm xuống 2 vì 1280×1280×4 ~ 25MB
        # activation per batch slot; batch=2 đủ latency + tránh OOM trên 12GB.
        batch_size: 2
        input:
          object: yolov8_primary.car
          shape: [3, 1280, 1280]
          scale_factor: 0.0039215697906911373
        output:
          layer_names:
            - output0
          converter:
            module: src.converters.generic_yolov8_converter
            class_name: GenericYOLOv8Converter
            kwargs:
              confidence_threshold: 0.50
              nms_iou_threshold: 0.45
          attributes: []
          num_detected_classes: 1
          objects:
            - class_id: 0
              label: plate
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.50

    # ── Stage 2a-pre-2: Plate Detector sGIE cho truck + motorcycle ───────────
    # Dùng cùng ONNX model, reuse TRT engine đã cache. batch_size=1 để tránh
    # OOM trên RTX 3060 12GB khi chạy song song với sGIE car ở trên.
    - element: nvinfer@complex_model
      name: plate_detector_sgie_heavy
      model:
        format: onnx
        model_file: /models/yolov8l_plate/yolov8l_plate.onnx
        batch_size: 1
        input:
          object: yolov8_primary.truck
          shape: [3, 1280, 1280]
          scale_factor: 0.0039215697906911373
        output:
          layer_names:
            - output0
          converter:
            module: src.converters.generic_yolov8_converter
            class_name: GenericYOLOv8Converter
            kwargs:
              confidence_threshold: 0.35
              nms_iou_threshold: 0.45
          attributes: []
          num_detected_classes: 1
          objects:
            - class_id: 0
              label: plate
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.35

    - element: nvinfer@complex_model
      name: plate_detector_sgie_moto
      model:
        format: onnx
        model_file: /models/yolov8l_plate/yolov8l_plate.onnx
        batch_size: 1
        input:
          object: yolov8_primary.motorcycle
          shape: [3, 1280, 1280]
          scale_factor: 0.0039215697906911373
        output:
          layer_names:
            - output0
          converter:
            module: src.converters.generic_yolov8_converter
            class_name: GenericYOLOv8Converter
            kwargs:
              confidence_threshold: 0.35
              nms_iou_threshold: 0.45
          attributes: []
          num_detected_classes: 1
          objects:
            - class_id: 0
              label: plate
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.35

    # ── Stage 2a: License Plate OCR ──────────────────────────────────────────
    # Đọc bbox "plate" do sGIE phía trên tạo ra, chạy PP-OCRv4 rec ONNX trên
    # crop. Nếu sGIE chưa hoạt động (engine chưa build), fallback sang ORT
    # YOLOv8l-plate nội bộ (plate_model_path) — xem plate_ocr.py.
    #
    # OCR engine: PP-OCRv4 mobile rec ONNX (KHÔNG dùng paddleocr library).
    # Input 48×320 fixed, CTC decode manual. Latency ~15-30ms/plate, giảm
    # ~30-50ms so với PaddleOCR library.
    - element: pyfunc
      name: plate_ocr
      module: src.lpr.plate_ocr
      class_name: PlateOCR
      kwargs:
        plate_model_path: /models/yolov8l_plate/yolov8l_plate.onnx
        ocr_model_path:   /models/ppocrv4_rec/ppocrv4_rec.onnx
        plate_conf_threshold: 0.35
        ocr_conf_threshold: 0.55
        # Cameras chĩa thẳng vào biển số — chạy ORT trực tiếp trên full frame
        # không cần primary detect vehicle trước.
        # bien_xe: camera quay ngang vào dòng xe ở cự ly gần — primary YOLOv8
        # luôn detect vehicle bbox bị clip ở mép trên (y1=0, h<200px) vì xe quá
        # lớn so với khung. Chuyển sang direct mode để chạy plate detector
        # thẳng trên full frame, ảnh lưu giữ nguyên context.
        direct_plate_cams:
          - cam_online_1
          - bien_xe
        # ROI zones — config per-camera, updated via /api/cameras/{id}/config
        # Format: source_id → [x1, y1, x2, y2] (pixel coords của full frame)
        # Empty dict = process full frame for all cameras (default fallback).
        # source_id = cam_{db_id} — loaded dynamically from DB.
        roi_zones: {}
        # Night mode: tự động kích hoạt CLAHE preprocess khi mean brightness < threshold
        night_mode_threshold: 80         # Mean pixel value 0-255
        # Temporal voting: số frame tích lũy trước khi quyết định biển số
        vote_window: 8
        # Background save worker
        save_crops: true
        save_dir: /Detect/lpr

    # ── Stage 2b-pre: Face Detector sGIE ─────────────────────────────────────
    # Chạy YOLOv8-face (derronqi/yolov8-face) thẳng trên GPU, operate trên crop
    # "person" do primary tạo. Tạo object con label "face" kèm attribute
    # "landmarks" (10 float = 5 kps × xy) dùng cho ArcFace alignment.
    #
    # Loại bỏ ORT CUDAExecutionProvider trong FaceRecognizer pyfunc:
    # FaceRecognizer đọc child object "face" + landmarks attr rồi chạy align →
    # ArcFace → anti-spoof.
    #
    # layer_names tương ứng 3 feature maps stride 8/16/32 — verify tên layer thực
    # tế bằng Netron nếu TRT build fail.
    - element: nvinfer@complex_model
      name: face_detector_sgie
      model:
        format: onnx
        model_file: /models/yolov8_face/yolov8n-face.onnx
        batch_size: 16
        input:
          object: yolov8_primary.person
          shape: [3, 640, 640]
          scale_factor: 0.0039215697906911373
        output:
          # YOLOv8-face ONNX (derronqi/hpc203) có 3 feature maps nhưng tên
          # layer thực tế: output0, 389, 397 (xác nhận qua netron).
          # Cảnh báo "Could not find output layer 'output1'" ở các build
          # trước là do config sai tên.
          layer_names:
            - output0
            - "389"
            - "397"
          converter:
            module: src.converters.yolov8_face_converter
            class_name: YOLOv8FaceConverter
            kwargs:
              confidence_threshold: 0.55
              nms_iou_threshold: 0.40
          attributes:
            - name: landmarks
              internal: false
          num_detected_classes: 1
          objects:
            - class_id: 0
              label: face
              selector:
                module: savant.selector.detector
                class_name: BBoxSelector
                kwargs:
                  confidence_threshold: 0.55

    # ── Stage 2b: Face Recognition (FR) ──────────────────────────────────────
    # Đọc child "face" + attr "landmarks" do sGIE phía trên tạo ra.
    # Nếu sGIE thiếu (engine chưa build / output layer name sai) sẽ fallback
    # sang YOLOv8FaceDetector ORT (yolov8_face_model_path) — xem face_recognizer.py.
    - element: pyfunc
      name: face_recognizer
      module: src.fr.face_recognizer
      class_name: FaceRecognizer
      kwargs:
        # Model paths (mount qua Docker volume /models)
        # Face detector: YOLOv8-face (mặc định, ít false-positive trên non-face).
        # SCRFD đã loại — code path scrfd_model_path đã bỏ.
        yolov8_face_model_path: /models/yolov8_face/yolov8n-face.onnx
        arcface_model_path: /models/glintr100.onnx
        anti_spoof_model_path: /models/anti_spoof/minifasnet.onnx
        # Detection params
        det_size: [640, 640]
        recognition_threshold: 0.60   # Cosine similarity tối thiểu để match
        # Anti-spoofing — BẬT lại sau khi sửa code đọc đúng output index 0 (real)
        # thay vì index 1 (fake_2D). MiniFASNet output [real, fake_2D, fake_3D].
        enable_anti_spoof: true
        spoof_threshold: 0.50
        # L1 Cache (in-process)
        l1_cache_capacity: 500
        l1_cache_ttl: 120             # 2 phút
        # Redis L2 Cache
        redis_host: redis
        redis_port: 6379
        redis_ttl: 600                # 10 phút
        # Database — đọc từ biến môi trường bằng OmegaConf syntax
        db_dsn: ${oc.env:POSTGRES_DSN,postgresql://svpro_user:svpro_pass@postgres:5432/svpro_db}
        # Stranger tracking config
        stranger_sha256_prefix_len: 16
        # Face quality filter thresholds
        quality_min_score: 0.50
        quality_min_sharpness: 50.0
        # Save faces
        save_crops: true
        save_dir: /Detect/face

    # ── Stage 2c: Behavior Analytics (Fighting + Tamper) ─────────────────────
    # Chạy sau FR để có numpy frame; ghi tag "behavior_alerts" cho business_logic.
    - element: pyfunc
      name: behavior_analytics
      module: src.analytics.behavior_pyfunc
      class_name: BehaviorPyfunc
      kwargs:
        model_dir: /models
        fighting_threshold: 0.6
        tamper_threshold: 0.7
        fighting_stride: 8
        tamper_interval: 25

    # ── Stage 3: Business Logic ───────────────────────────────────────────────
    # ObjectLinker + BlacklistEngine + AlertManager
    - element: pyfunc
      name: business_logic
      module: src.business.blacklist_engine
      class_name: BlacklistPyfunc
      kwargs:
        # Zones và quyền truy cập theo camera
        # Camera → zone mapping: loaded dynamically from DB if empty.
        # Fallback: cameras will use "zone_denied" check only if configured.
        camera_zones: {}
        zone_access:
          gate:     ["staff", "admin", "management"]
          parking:  ["staff", "admin", "management", "visitor"]
          entrance: ["staff", "admin"]
          test:     ["staff", "admin", "visitor"]
        # Object linker config
        object_linker_max_dist_px: 150
        object_linker_temporal_secs: 2.0
        # Audit logger
        audit_base_dir: /Detect/behavior
        # Alert manager
        alert_rate_secs: 60
        alert_global_rpm: 20
