services:
  # ── Ingress Manager: Dynamic RTSP từ DB ──
  ingress-manager:
    build:
      context: .
      dockerfile: Dockerfile.ingress-manager
    restart: unless-stopped
    entrypoint: python
    command: ["/opt/savant/user_data/src/ingress/ingress_manager.py"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/opt/savant/user_data
      - zmq-sockets:/tmp/zmq-sockets
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      - ZMQ_ENDPOINT=pub+connect:ipc:///tmp/zmq-sockets/input-video.ipc
      - POLL_INTERVAL_SECS=10
      - ZMQ_SNDHWM=100
      - ZMQ_SNDTIMEO=200
      - ZMQ_LINGER=0
      - EOS_THRESHOLD=5
      - EOS_WINDOW_SECS=1.0
      - GST_PLUGIN_PATH=/opt/savant/adapters/gst/gst_plugins

  # ── AI Core: GPU Pipeline xử lý LPR + FR ──
  savant-ai-core:
    build:
      context: .
      dockerfile: Dockerfile.savant-ai-core
    runtime: nvidia
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080" # Metrics / Health
    volumes:
      - .:/opt/savant/user_data
      - zmq-sockets:/tmp/zmq-sockets
      - ./models:/models
      - ./Detect:/Detect
    environment:
      - PYTHONPATH=/opt/savant:/opt/savant/user_data
      - MODEL_PATH=/models
      # ZMQ Input & Output
      - ZMQ_SRC_ENDPOINT=sub+bind:ipc:///tmp/zmq-sockets/input-video.ipc
      - ZMQ_SINK_ENDPOINT=pub+bind:ipc:///tmp/zmq-sockets/output-video.ipc
      # ZMQ HWM (Task 1.6)
      - ZMQ_SNDHWM=100
      - ZMQ_RCVHWM=100
      # Database credentials — dùng env thay vì hardcode trong module.yml
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
    command: /opt/savant/user_data/module/module.yml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=30)"]
      interval: 30s
      timeout: 30s
      retries: 5

  # ── Egress: Xuất JSON metadata ──
  json-egress:
    image: ghcr.io/insight-platform/savant-adapters-py:latest
    restart: unless-stopped
    entrypoint: python
    command:
      - /opt/savant/adapters/python/sinks/metadata_json.py
    volumes:
      - zmq-sockets:/tmp/zmq-sockets
      - ./output:/output
    environment:
      - ZMQ_ENDPOINT=sub+connect:ipc:///tmp/zmq-sockets/output-video.ipc
      - ZMQ_TYPE=SUB
      - DIR=/output
      - FILENAME_PATTERN=%source_id-%timestamp
      - CHUNK_SIZE=0
      - ZMQ_SNDHWM=100
      - ZMQ_RCVHWM=100
      - PYTHONPATH=/opt/savant

  # ── Egress: Always-On RTSP Video Output (cần Linux + DeepStream adapter) ──
  video-egress:
    profiles: ["rtsp-out"]  # Chỉ chạy khi: docker compose --profile rtsp-out up
    image: ghcr.io/insight-platform/savant-adapters-gstreamer:latest
    restart: unless-stopped
    entrypoint: /opt/savant/adapters/gst/sinks/always_on_rtsp.sh
    ports:
      - "554:554"     # RTSP output
      - "888:888"     # Player HTTP
    environment:
      - ZMQ_ENDPOINT=sub+connect:ipc:///tmp/zmq-sockets/output-video.ipc
      - SOURCE_ID=cam_online_1
      - MAX_DELAY_MS=1000
      - STUB_FILE_LOCATION=/opt/savant/adapters/gst/sinks/stub_imgs/smpte100_1280x720.jpeg
      - FRAMERATE=15/1
      - CODEC=h264
      - BITRATE=4000000
      - GST_PLUGIN_PATH=/opt/savant/adapters/gst/gst_plugins
    volumes:
      - zmq-sockets:/tmp/zmq-sockets

  # ── PostgreSQL + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: svpro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-svpro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svpro_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-svpro_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svpro_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migration (chạy 1 lần khi startup) ──
  db-init:
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-svpro_pass}
    volumes:
      - ./scripts/sql:/sql
    command: >
      bash -c "
        psql -h postgres -U ${POSTGRES_USER:-svpro_user} -d ${POSTGRES_DB:-svpro_db} -f /sql/schema.sql &&
        psql -h postgres -U ${POSTGRES_USER:-svpro_user} -d ${POSTGRES_DB:-svpro_db} -f /sql/migrations/001_sprint4_5.sql &&
        psql -h postgres -U ${POSTGRES_USER:-svpro_user} -d ${POSTGRES_DB:-svpro_db} -f /sql/seed_cameras.sql &&
        echo '✅ DB migrations + seed applied.'
      "
    restart: "no"

  # ── FastAPI Backend ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: svpro_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}
      REDIS_HOST:   redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── Redis (Hot Cache) ──
  redis:
    image: redis:7-alpine
    container_name: svpro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus — Metrics Collection ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: svpro_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana — Visualization ──
  grafana:
    image: grafana/grafana:10.4.0
    container_name: svpro_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"   # 3001 để tránh conflict với React dev server
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/svpro.json:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASS:-svpro2024}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "http://localhost:3001"
      GF_FEATURE_TOGGLES_ENABLE:  "publicDashboards"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis Exporter ──
  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: svpro_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  # ── PostgreSQL Exporter ──
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: svpro_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-svpro_user}:${POSTGRES_PASSWORD:-svpro_pass}@postgres:5432/${POSTGRES_DB:-svpro_db}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  zmq-sockets:
  pgdata:
  redis_data:
  prometheus_data:
  grafana_data:

